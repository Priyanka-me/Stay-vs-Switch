<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Stay vs Switch Analyser</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",system-ui,sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:24px 16px 56px}
.header{text-align:center;margin-bottom:28px}
.header p{font-size:13px;color:#6b6b67;margin-top:5px;line-height:1.6}
.badge{display:inline-block;font-size:10px;font-weight:600;letter-spacing:.06em;background:#eceae3;color:#4a4a46;padding:3px 10px;border-radius:99px;margin-bottom:10px;text-transform:uppercase}
h1{font-size:21px;font-weight:600}
h2{font-size:16px;font-weight:500}
h3{font-size:14px;font-weight:500}

.step-bar{display:flex;gap:4px;margin-bottom:24px}
.step-dot{flex:1;height:3px;border-radius:2px;background:#d8d6ce;transition:background .3s}
.step-dot.done{background:#533ab7}
.step-dot.active{background:#7c6ed4}

.section{background:#fff;border:0.5px solid #e0ded6;border-radius:14px;padding:18px;margin-bottom:14px}
.q-label{font-size:13px;font-weight:500;color:#3d3d3a;margin-bottom:7px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.q-hint{font-size:11px;color:#9a9893;font-weight:400;flex-shrink:0}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.slider-row input[type=range]{flex:1;accent-color:#533ab7}
.slider-val{font-size:13px;font-weight:500;min-width:26px;text-align:right;color:#533ab7}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.pill{font-size:12px;padding:5px 12px;border-radius:99px;border:0.5px solid #d8d6ce;background:#fafaf7;cursor:pointer;transition:all .15s;color:#4a4a46}
.pill.sel{background:#533ab7;color:#fff;border-color:#533ab7}
.nav{display:flex;gap:10px;margin-top:18px}
.btn{flex:1;padding:10px;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .15s}
.btn-back{background:#f0efe9;color:#3d3d3a}.btn-back:hover{background:#e8e6de}
.btn-next{background:#533ab7;color:#fff}.btn-next:hover{background:#422f96}
.btn-next:disabled{background:#c0b8e8;cursor:not-allowed}

/* Industry grid */
.industry-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:16px}
.ind-card{border:0.5px solid #d8d6ce;border-radius:10px;padding:10px 12px;cursor:pointer;transition:all .15s;background:#fafaf7;text-align:center}
.ind-card:hover{border-color:#7c6ed4;background:#f4f2fc}
.ind-card.sel{border-color:#533ab7;background:#f0edf8}
.ind-icon{font-size:20px;margin-bottom:4px}
.ind-name{font-size:12px;font-weight:500;color:#3d3d3a}

/* Result */
.result-card{border-radius:14px;padding:22px;margin-bottom:14px;text-align:center}
.verdict-stay{background:#e8f3e0;border:1px solid #a8d898}
.verdict-switch{background:#f3e8e0;border:1px solid #d8a888}
.verdict-borderline{background:#f0edf8;border:1px solid #b8a8e0}
.verdict-icon{font-size:36px;margin-bottom:6px}
.verdict-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px;opacity:.65}
.verdict-title{font-size:22px;font-weight:700;margin-bottom:6px}
.verdict-sub{font-size:13px;opacity:.7;line-height:1.6}
.verdict-score{font-size:20px;font-weight:700;margin-top:12px}

.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.score-card{background:#fafaf7;border:0.5px solid #e0ded6;border-radius:10px;padding:11px}
.score-name{font-size:11px;color:#6b6b67;margin-bottom:4px}
.score-bar-wrap{background:#eceae3;border-radius:99px;height:5px;margin-bottom:4px}
.score-bar{height:5px;border-radius:99px;transition:width .6s}
.score-num{font-size:12px;font-weight:500;color:#3d3d3a}

.reasons{background:#fff;border:0.5px solid #e0ded6;border-radius:14px;padding:16px;margin-bottom:14px}
.reason-item{display:flex;gap:10px;align-items:flex-start;padding:7px 0;border-bottom:0.5px solid #f0efe9}
.reason-item:last-child{border:none}
.reason-icon{font-size:15px;flex-shrink:0;margin-top:1px}
.reason-text{font-size:13px;color:#3d3d3a;line-height:1.55}
.reason-cat{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#9a9893;margin-bottom:2px}

.action-list{list-style:none;padding:0}
.action-list li{display:flex;gap:8px;padding:6px 0;font-size:13px;color:#3d3d3a;border-bottom:0.5px solid #f0efe9;line-height:1.5}
.action-list li:last-child{border:none}
.action-list li::before{content:"→";color:#533ab7;font-weight:600;flex-shrink:0;margin-top:1px}

/* AI box */
.ai-box{background:#f0edf8;border:0.5px solid #c0b8e8;border-radius:12px;padding:16px;margin-bottom:14px}
.ai-box-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:13px;font-weight:500;color:#3c3489}
.ai-text{font-size:13px;color:#3d3d3a;line-height:1.65;white-space:pre-wrap}
.dots span{display:inline-block;animation:bounce .8s infinite}
.dots span:nth-child(2){animation-delay:.15s}
.dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* Benchmark */
.benchmark-box{background:#fff;border:0.5px solid #e0ded6;border-radius:14px;padding:18px;margin-bottom:14px}
.percentile-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.pct-card{background:#fafaf7;border:0.5px solid #e0ded6;border-radius:10px;padding:10px 12px;text-align:center}
.pct-num{font-size:20px;font-weight:700;color:#533ab7}
.pct-label{font-size:11px;color:#6b6b67;margin-top:2px}

/* Download form */
.download-form{background:#fff;border:0.5px solid #e0ded6;border-radius:14px;padding:18px;margin-bottom:14px}
.form-row{margin-bottom:12px}
.form-label{font-size:12px;font-weight:500;color:#3d3d3a;margin-bottom:5px;display:block}
.form-input{width:100%;padding:9px 12px;border:0.5px solid #d8d6ce;border-radius:8px;font-size:13px;color:#1a1a18;background:#fafaf7;outline:none;transition:border .15s}
.form-input:focus{border-color:#533ab7;background:#fff}
.form-input.err{border-color:#e24b4a}
.form-err{font-size:11px;color:#e24b4a;margin-top:3px}
.btn-download{width:100%;padding:12px;border-radius:10px;background:#533ab7;color:#fff;border:none;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-download:hover{background:#422f96}
.btn-download:disabled{background:#c0b8e8;cursor:not-allowed}
.download-success{background:#e8f3e0;border:0.5px solid #a8d898;border-radius:10px;padding:12px 14px;font-size:13px;color:#0f6e56;margin-top:10px;display:none}

/* Share */
.share-box{background:#fff;border:0.5px solid #e0ded6;border-radius:12px;padding:14px;margin-bottom:14px}
.share-row{display:flex;gap:8px;margin-top:10px}
.share-input{flex:1;padding:8px 10px;border:0.5px solid #d8d6ce;border-radius:8px;font-size:12px;color:#3d3d3a;background:#fafaf7;font-family:monospace}
.share-btn{padding:8px 14px;border-radius:8px;background:#533ab7;color:#fff;border:none;font-size:12px;font-weight:500;cursor:pointer}
.share-btn:hover{background:#422f96}
.copy-confirm{font-size:11px;color:#0f6e56;margin-top:5px;min-height:16px}

.btn-restart{width:100%;padding:11px;border-radius:10px;background:#f0efe9;border:none;font-size:14px;font-weight:500;cursor:pointer;color:#3d3d3a;margin-top:6px}
.btn-restart:hover{background:#e8e6de}
.viewed-banner{background:#fff8e6;border:0.5px solid #fac775;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#633806;display:flex;align-items:center;gap:8px}

.chart-wrap{position:relative;height:220px;margin-top:14px}

@media(max-width:480px){.score-grid,.percentile-grid{grid-template-columns:1fr}.industry-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="badge">Career Tool · v3</div>
    <h1>Stay vs Switch Analyser</h1>
    <p>AI-powered · Benchmark data · Downloadable PDF report</p>
  </div>
  <div class="step-bar" id="stepBar"></div>
  <div id="content"></div>
</div>

<script>
/* ─── DATA ─── */
const FORMSPREE_ENDPOINT = "https://formspree.io/f/mykagdao";

const INDUSTRIES = [
  {id:"tech",name:"Tech / SaaS",icon:"💻",mods:{skill_growth:1.1,skills_demand:1.2,salary_vs_market:1.1}},
  {id:"finance",name:"Finance / Banking",icon:"🏦",mods:{raise_trajectory:1.15,company_stability:1.1,promotion_clarity:1.1}},
  {id:"consulting",name:"Consulting",icon:"📋",mods:{mentorship:1.15,skill_growth:1.1,work_impact:0.9}},
  {id:"startup",name:"Startup",icon:"🚀",mods:{skill_growth:1.2,company_stability:0.8,work_impact:1.15}},
  {id:"govt",name:"Government / PSU",icon:"🏛️",mods:{company_stability:1.3,raise_trajectory:0.85,skills_demand:0.85}},
  {id:"mfg",name:"Manufacturing",icon:"⚙️",mods:{company_stability:1.1,salary_vs_market:0.95,skills_demand:0.9}},
  {id:"health",name:"Healthcare",icon:"🏥",mods:{work_impact:1.2,burnout_risk:1.1,skills_demand:1.05}},
  {id:"media",name:"Media / Creative",icon:"🎨",mods:{work_impact:1.1,salary_vs_market:0.9,skills_demand:1.0}},
];

// Simulated industry benchmark averages (out of 10) — replace with real aggregated data over time
const BENCHMARKS = {
  tech:     {Compensation:6.8,Growth:6.5,Role:6.2,Culture:5.9,Market:7.4,Overall:6.6},
  finance:  {Compensation:7.2,Growth:5.8,Role:5.6,Culture:5.3,Market:6.1,Overall:6.1},
  consulting:{Compensation:6.4,Growth:6.9,Role:6.0,Culture:5.5,Market:6.8,Overall:6.4},
  startup:  {Compensation:5.9,Growth:7.3,Role:6.8,Culture:6.2,Market:7.0,Overall:6.7},
  govt:     {Compensation:5.5,Growth:4.8,Role:5.2,Culture:6.1,Market:4.2,Overall:5.3},
  mfg:      {Compensation:6.1,Growth:5.3,Role:5.5,Culture:5.8,Market:5.0,Overall:5.6},
  health:   {Compensation:6.3,Growth:5.9,Role:6.5,Culture:5.4,Market:6.3,Overall:6.1},
  media:    {Compensation:5.4,Growth:6.1,Role:6.3,Culture:6.0,Market:5.8,Overall:5.9},
};

const STEPS = [
  {title:"Your profile",icon:"🏢",questions:[
    {id:"industry",label:"What industry are you in?",type:"industry"},
    {id:"tenure",label:"How long have you been in this role?",type:"pills",options:["< 6 months","6–12 months","1–2 years","2+ years"]}
  ]},
  {title:"Compensation & Benefits",icon:"💰",questions:[
    {id:"salary_vs_market",label:"How does your salary compare to market rate?",hint:"Check levels.fyi",type:"slider",min:0,max:10,step:1,labels:["Far below","At market","Far above"]},
    {id:"raise_trajectory",label:"Annual raise trajectory",hint:"0=flat, 10=15%+/yr",type:"slider",min:0,max:10,step:1,labels:["Flat","Modest","Strong"]},
    {id:"benefits_quality",label:"Benefits quality (health, PF/NPS, equity, perks)",type:"slider",min:0,max:10,step:1,labels:["Poor","Average","Excellent"]}
  ]},
  {title:"Growth & Learning",icon:"🚀",questions:[
    {id:"skill_growth",label:"How fast are you building marketable skills?",type:"slider",min:0,max:10,step:1,labels:["Stagnant","Steady","Rocket-ship"]},
    {id:"mentorship",label:"Quality of mentorship and feedback",type:"slider",min:0,max:10,step:1,labels:["None","Occasional","Strong"]},
    {id:"promotion_clarity",label:"Is there a clear promotion path for you?",type:"pills",options:["No path visible","Vague timeline","Clear 12–18 mo","Already on track"]}
  ]},
  {title:"Role & Impact",icon:"🎯",questions:[
    {id:"role_clarity",label:"Clarity of your role and responsibilities",type:"slider",min:0,max:10,step:1,labels:["Chaotic","Mostly clear","Crystal clear"]},
    {id:"work_impact",label:"How meaningful / impactful is your work?",type:"slider",min:0,max:10,step:1,labels:["Invisible","Noticeable","High impact"]},
    {id:"visibility",label:"Do decision-makers know your contributions?",type:"pills",options:["Not at all","Somewhat","Yes, regularly","I'm well known"]}
  ]},
  {title:"Manager & Culture",icon:"🤝",questions:[
    {id:"manager_quality",label:"Manager quality (support, advocacy, feedback)",type:"slider",min:0,max:10,step:1,labels:["Toxic","Neutral","Excellent"]},
    {id:"psych_safety",label:"Psychological safety — can you speak up?",type:"slider",min:0,max:10,step:1,labels:["Fear-driven","Guarded","Full safety"]},
    {id:"burnout_risk",label:"Current burnout / stress level",hint:"Higher = more burned out",type:"slider",min:0,max:10,step:1,labels:["No stress","Manageable","Burned out"]}
  ]},
  {title:"Market & Stability",icon:"📊",questions:[
    {id:"skills_demand",label:"How in-demand are your skills externally?",type:"slider",min:0,max:10,step:1,labels:["Niche/low","Average","Hot market"]},
    {id:"company_stability",label:"Company financial health / job security",type:"slider",min:0,max:10,step:1,labels:["At-risk","Stable","Very strong"]}
  ]}
];

const PILL_SCORES = {
  promotion_clarity:{"No path visible":1,"Vague timeline":4,"Clear 12–18 mo":7,"Already on track":10},
  visibility:{"Not at all":1,"Somewhat":4,"Yes, regularly":7,"I'm well known":10},
  tenure:{"< 6 months":3,"6–12 months":5,"1–2 years":7,"2+ years":9}
};

const DIM_COLORS = {Compensation:"#533ab7",Growth:"#1d9e75",Role:"#ba7517",Culture:"#993556",Market:"#185fa5"};

let step=0, answers={}, aiNarrative="", isSharedView=false, chartInstance=null;

/* ─── STEP BAR ─── */
function initStepBar(){
  document.getElementById("stepBar").innerHTML=STEPS.map((_,i)=>`<div class="step-dot" id="sd${i}"></div>`).join("");
}
function updateStepBar(){
  STEPS.forEach((_,i)=>{
    const d=document.getElementById("sd"+i);
    if(d) d.className="step-dot"+(i<step?" done":i===step?" active":"");
  });
}

/* ─── SCORING ─── */
function getIndustryMods(){ const ind=INDUSTRIES.find(x=>x.id===answers.industry); return ind?ind.mods:{}; }
function applyMods(val,key){ const m=getIndustryMods(); return m[key]?Math.min(10,val*m[key]):val; }
function g(k){ return applyMods(answers[k]||5,k); }

function computeScore(){
  const dims={};
  const promScore=PILL_SCORES.promotion_clarity[answers.promotion_clarity]||5;
  const visScore=PILL_SCORES.visibility[answers.visibility]||5;
  dims.Compensation=Math.min(10,g("salary_vs_market")*0.5+g("raise_trajectory")*0.3+g("benefits_quality")*0.2);
  dims.Growth=Math.min(10,g("skill_growth")*0.45+g("mentorship")*0.25+applyMods(promScore,"promotion_clarity")*0.30);
  dims.Role=Math.min(10,g("role_clarity")*0.35+g("work_impact")*0.40+applyMods(visScore,"visibility")*0.25);
  const bInv=10-applyMods(answers.burnout_risk||5,"burnout_risk");
  dims.Culture=Math.min(10,g("manager_quality")*0.45+g("psych_safety")*0.30+bInv*0.25);
  dims.Market=Math.min(10,g("skills_demand")*0.55+g("company_stability")*0.45);
  Object.keys(dims).forEach(k=>{ dims[k]=Math.round(dims[k]*10)/10; });
  const overall=dims.Compensation*0.20+dims.Growth*0.28+dims.Role*0.18+dims.Culture*0.22+dims.Market*0.12;
  return {overall:Math.round(overall*10)/10,dims};
}

function getVerdict(score){
  if(score>=6.8) return {v:"stay",label:"Recommendation",title:"Stay & Optimise",sub:"Your current role has more to give. Focus on the gaps below.",icon:"✅",cls:"verdict-stay",col:"#0f6e56"};
  if(score<=4.2) return {v:"switch",label:"Recommendation",title:"Start Looking",sub:"The signals are pointing outward. It's time to explore.",icon:"🚪",cls:"verdict-switch",col:"#993c1d"};
  return {v:"borderline",label:"Borderline call",title:"It Depends",sub:"Some dimensions pull you out, others anchor you in.",icon:"⚖️",cls:"verdict-borderline",col:"#3c3489"};
}

function computePercentiles(dims, overall){
  const ind=answers.industry||"tech";
  const bench=BENCHMARKS[ind]||BENCHMARKS.tech;
  const pcts={};
  const allDims={...dims, Overall:overall};
  Object.keys(allDims).forEach(k=>{
    const bVal=bench[k]||5;
    const userVal=allDims[k];
    // Gaussian-ish percentile simulation around benchmark
    const diff=(userVal-bVal)/2.5;
    const pct=Math.min(99,Math.max(1,Math.round(50+diff*20)));
    pcts[k]=pct;
  });
  return pcts;
}

function generateReasons(dims,overall){
  const r=[];
  const {Compensation,Growth,Role,Culture,Market}=dims;
  if(Growth>=7.5) r.push({icon:"🌱",cat:"Growth",text:"You're learning fast. Leaving now interrupts compounding career capital that takes years to rebuild.",type:"stay"});
  if(Culture>=7.5) r.push({icon:"🤝",cat:"Culture",text:"Good manager + psychological safety is rare. These are assets that are easy to lose and hard to find again.",type:"stay"});
  if(Compensation>=7.5) r.push({icon:"💰",cat:"Compensation",text:"You're paid competitively. A switch might offer a small bump but could sacrifice other strengths.",type:"stay"});
  if(Role>=7) r.push({icon:"🎯",cat:"Impact",text:"Clear impact and visibility drive internal promotions. You're in a strong position to build your portfolio here.",type:"stay"});
  if(answers.tenure==="< 6 months") r.push({icon:"⏱️",cat:"Timing",text:"Leaving before 12 months signals instability to future employers. Consider crossing that threshold first.",type:"stay"});
  if(Growth<4.5) r.push({icon:"📉",cat:"Growth",text:"Skill growth is stagnant. Every month here widens the gap with peers who are compounding faster.",type:"switch"});
  if(Culture<4) r.push({icon:"⚠️",cat:"Culture",text:"Low psychological safety and/or a difficult manager caps your potential and increases burnout risk significantly.",type:"switch"});
  if(Compensation<4) r.push({icon:"💸",cat:"Compensation",text:"You're likely underpaid relative to market. Early-career switching premiums are often 20–40%.",type:"switch"});
  if(Market>=7.5) r.push({icon:"🔥",cat:"Market",text:"Your skills are in high demand right now. Leverage is highest when the market wants you — use it.",type:"switch"});
  if((answers.burnout_risk||5)>=7) r.push({icon:"🛑",cat:"Wellbeing",text:"High burnout at this stage can derail years of progress. Your energy is career capital too.",type:"switch"});
  if((answers.company_stability||5)<=4) r.push({icon:"⚡",cat:"Stability",text:"Company stability looks precarious. Better to leave on your own terms than be caught in a layoff cycle.",type:"switch"});
  const stay=r.filter(x=>x.type==="stay"), sw=r.filter(x=>x.type==="switch");
  return overall>=5.5?[...stay,...sw]:[...sw,...stay];
}

function generateActions(dims,verdict){
  const a=[];
  if(verdict==="stay"||verdict==="borderline"){
    if(dims.Compensation<6) a.push("Research market salary on levels.fyi and prepare a compensation review conversation within 90 days.");
    if(dims.Growth<6) a.push("Identify one stretch project this quarter that builds a skill gap — ask your manager explicitly for it.");
    if(dims.Culture<6) a.push("Schedule a direct career-trajectory conversation with your manager. Their response tells you a lot.");
    a.push("Set a 6-month checkpoint: revisit this analysis if nothing has materially improved.");
  }
  if(verdict==="switch"||verdict==="borderline"){
    if(dims.Market>=6) a.push("Update your resume and LinkedIn now — your skills are in demand. Apply before you're in a desperate position.");
    a.push("Talk to 3 people in roles you want. Informational interviews surface opportunities and calibrate expectations.");
    a.push("Give yourself a 90-day search runway: start while still employed to maximise leverage.");
    if(answers.tenure==="< 6 months") a.push("If possible, cross the 12-month mark first to remove the 'job hopper' signal from your profile.");
  }
  return a.slice(0,4);
}

/* ─── RENDER STEP ─── */
function render(){
  updateStepBar();
  if(step<STEPS.length) renderStep();
  else renderResult();
}

function renderStep(){
  const s=STEPS[step];
  let html=`<div class="section"><h2>${s.icon} ${s.title}</h2><div style="margin-top:14px">`;
  s.questions.forEach(q=>{
    html+=`<div><div class="q-label"><span>${q.label}</span>${q.hint?`<span class="q-hint">${q.hint}</span>`:""}</div>`;
    if(q.type==="industry"){
      html+=`<div class="industry-grid">`;
      INDUSTRIES.forEach(ind=>{
        html+=`<div class="ind-card${answers.industry===ind.id?" sel":""}" onclick="setIndustry('${ind.id}')"><div class="ind-icon">${ind.icon}</div><div class="ind-name">${ind.name}</div></div>`;
      });
      html+=`</div>`;
    } else if(q.type==="slider"){
      const val=answers[q.id]!==undefined?answers[q.id]:5;
      html+=`<div class="slider-row"><span style="font-size:11px;color:#9a9893;min-width:56px">${q.labels[0]}</span><input type="range" min="${q.min}" max="${q.max}" step="${q.step}" value="${val}" id="sl_${q.id}" oninput="setSlider('${q.id}',this.value)"><span class="slider-val" id="sv_${q.id}">${val}</span></div>`;
    } else if(q.type==="pills"){
      html+=`<div class="pills">`;
      q.options.forEach(o=>{ html+=`<div class="pill${answers[q.id]===o?" sel":""}" onclick="setPill('${q.id}','${o}')">${o}</div>`; });
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div></div><div class="nav">`;
  if(step>0) html+=`<button class="btn btn-back" onclick="go(-1)">Back</button>`;
  html+=`<button class="btn btn-next" onclick="go(1)" ${isStepComplete()?"":"disabled"}>${step===STEPS.length-1?"See my result →":"Next →"}</button></div>`;
  document.getElementById("content").innerHTML=html;
}

function isStepComplete(){
  return STEPS[step].questions.every(q=>{
    if(q.type==="industry") return !!answers.industry;
    if(q.type==="slider") return answers[q.id]!==undefined;
    return answers[q.id]!==undefined;
  });
}

function setIndustry(id){ answers.industry=id; renderStep(); }
function setSlider(id,val){ answers[id]=parseInt(val); document.getElementById("sv_"+id).textContent=val; refreshNav(); }
function setPill(id,val){ answers[id]=val; renderStep(); }
function refreshNav(){ const b=document.querySelector(".btn-next"); if(b) b.disabled=!isStepComplete(); }
function go(dir){
  if(dir===1&&!isStepComplete()) return;
  STEPS[step].questions.forEach(q=>{ if(q.type==="slider"&&answers[q.id]===undefined) answers[q.id]=5; });
  step+=dir; render(); window.scrollTo({top:0,behavior:"smooth"});
}

/* ─── RESULT ─── */
function renderResult(){
  const {overall,dims}=computeScore();
  const verdict=getVerdict(overall);
  const reasons=generateReasons(dims,overall);
  const actions=generateActions(dims,verdict.v);
  const percentiles=computePercentiles(dims,overall);
  const ind=INDUSTRIES.find(x=>x.id===answers.industry);
  const shareURL=buildShareURL(answers);

  let html="";
  if(isSharedView) html+=`<div class="viewed-banner">👁️ You're viewing a shared result. <a href="${window.location.href.split("?")[0]}" style="color:#533ab7;margin-left:4px">Take your own →</a></div>`;

  // Verdict card
  html+=`<div class="result-card ${verdict.cls}">
    <div class="verdict-icon">${verdict.icon}</div>
    <div class="verdict-label">${verdict.label}</div>
    <div class="verdict-title">${verdict.title}</div>
    <div class="verdict-sub">${verdict.sub}</div>
    <div class="verdict-score" style="color:${verdict.col}">${overall}/10 ${ind?`· ${ind.icon} ${ind.name}`:""}</div>
  </div>`;

  // AI narrative
  html+=`<div class="ai-box">
    <div class="ai-box-header"><span style="font-size:16px">✦</span> AI career coaching</div>
    <div class="ai-text" id="ai-text"><span>Analysing your profile</span><span class="dots"><span>.</span><span>.</span><span>.</span></span></div>
  </div>`;

  // Dimension breakdown
  html+=`<div class="section"><h3 style="margin-bottom:12px">Dimension breakdown</h3><div class="score-grid">`;
  Object.entries(dims).forEach(([name,val])=>{
    html+=`<div class="score-card"><div class="score-name">${name}</div><div class="score-bar-wrap"><div class="score-bar" style="width:${Math.round(val*10)}%;background:${DIM_COLORS[name]||"#533ab7"}"></div></div><div class="score-num">${val.toFixed(1)} / 10</div></div>`;
  });
  html+=`</div></div>`;

  // Benchmark section
  const bench=BENCHMARKS[answers.industry||"tech"];
  html+=`<div class="benchmark-box">
    <h3>How you compare to ${ind?ind.name:"your industry"} peers</h3>
    <div class="chart-wrap"><canvas id="benchChart"></canvas></div>
    <div class="percentile-grid">`;
  Object.entries(percentiles).forEach(([k,v])=>{
    const color=v>=70?"#0f6e56":v>=50?"#533ab7":"#993c1d";
    html+=`<div class="pct-card"><div class="pct-num" style="color:${color}">${v}th</div><div class="pct-label">${k} percentile</div></div>`;
  });
  html+=`</div></div>`;

  // Key signals
  if(reasons.length){
    html+=`<div class="reasons"><h3 style="margin-bottom:8px">Key signals</h3>`;
    reasons.slice(0,5).forEach(r=>{
      html+=`<div class="reason-item"><span class="reason-icon">${r.icon}</span><div><div class="reason-cat">${r.cat} · ${r.type==="stay"?"Reason to stay":"Reason to switch"}</div><div class="reason-text">${r.text}</div></div></div>`;
    });
    html+=`</div>`;
  }

  // Actions
  html+=`<div class="section"><h3 style="margin-bottom:10px">Your next moves</h3><ul class="action-list">`;
  actions.forEach(a=>{ html+=`<li>${a}</li>`; });
  html+=`</ul></div>`;

  // Download form
  html+=`<div class="download-form">
    <h3 style="margin-bottom:4px">📄 Download your full PDF report</h3>
    <p style="font-size:12px;color:#6b6b67;margin-bottom:14px">Enter your details to receive a personalised PDF report.</p>
    <div class="form-row"><label class="form-label">Full name *</label><input class="form-input" id="dl-name" placeholder="e.g. Priya Sharma" type="text"/><div class="form-err" id="err-name"></div></div>
    <div class="form-row"><label class="form-label">WhatsApp number *</label><input class="form-input" id="dl-wa" placeholder="e.g. +91 98765 43210" type="tel"/><div class="form-err" id="err-wa"></div></div>
    <div class="form-row"><label class="form-label">Email address *</label><input class="form-input" id="dl-email" placeholder="you@example.com" type="email"/><div class="form-err" id="err-email"></div></div>
    <button class="btn-download" id="dl-btn" onclick="handleDownload()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download PDF Report
    </button>
    <div class="download-success" id="dl-success">✓ PDF downloaded! We'll be in touch if needed.</div>
  </div>`;

  // Share
  html+=`<div class="share-box">
    <h3>Share your result</h3>
    <p style="font-size:12px;color:#6b6b67;margin-top:4px">Answers encoded in the link — nothing stored on any server.</p>
    <div class="share-row"><input class="share-input" id="share-url" value="${shareURL}" readonly onclick="this.select()"><button class="share-btn" onclick="copyShare()">Copy link</button></div>
    <div class="copy-confirm" id="copy-confirm"></div>
  </div>`;

  html+=`<div style="font-size:11px;color:#9a9893;text-align:center;margin:8px 0 12px;line-height:1.6">Framework for structured thinking — not a substitute for a mentor or career coach.</div>`;
  html+=`<button class="btn-restart" onclick="restart()">↺ Start over</button>`;

  document.getElementById("content").innerHTML=html;
  document.getElementById("stepBar").innerHTML=STEPS.map(()=>`<div class="step-dot done"></div>`).join("");

  setTimeout(()=>renderBenchmarkChart(dims,bench),100);
  fetchAINarrative(dims,verdict,overall);
}

/* ─── BENCHMARK CHART ─── */
function renderBenchmarkChart(dims,bench){
  const ctx=document.getElementById("benchChart");
  if(!ctx) return;
  if(chartInstance) chartInstance.destroy();
  const labels=Object.keys(dims);
  const userData=labels.map(k=>dims[k]);
  const benchData=labels.map(k=>bench[k]||5);
  chartInstance=new Chart(ctx,{
    type:"bar",
    data:{
      labels,
      datasets:[
        {label:"You",data:userData,backgroundColor:"#533ab7",borderRadius:4,borderSkipped:false},
        {label:"Industry avg",data:benchData,backgroundColor:"#d8d6ce",borderRadius:4,borderSkipped:false}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{position:"top",labels:{font:{size:11},boxWidth:12,padding:12}}},
      scales:{
        y:{min:0,max:10,grid:{color:"#f0efe9"},ticks:{font:{size:10}}},
        x:{grid:{display:false},ticks:{font:{size:10}}}
      }
    }
  });
}

/* ─── AI NARRATIVE ─── */
async function fetchAINarrative(dims,verdict,overall){
  const ind=INDUSTRIES.find(x=>x.id===answers.industry);
  const prompt=`You are a career coach for early-career professionals in ${ind?ind.name:"a professional field"}.
A professional just completed a Stay vs Switch career analysis. Scores (out of 10):
Overall: ${overall}/10 | Compensation: ${dims.Compensation} | Growth: ${dims.Growth} | Role: ${dims.Role} | Culture: ${dims.Culture} | Market: ${dims.Market}
Verdict: ${verdict.title} | Tenure in role: ${answers.tenure}

Write a warm, direct 3-paragraph coaching narrative (no headers, no bullets, under 180 words).
Para 1: What the numbers honestly reveal about their situation (2 sentences).
Para 2: The single most important thing to focus on in the next 90 days (specific to their scores).
Para 3: A motivating insight about early-career decision-making.
Be honest, not generic. Don't restate all scores.`;
  const el=document.getElementById("ai-text");
  if(!el) return;
  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const text=data.content?.map(c=>c.text||"").join("")||"";
    if(el) el.textContent=text||"Unable to generate AI narrative. See the analysis below.";
  }catch(e){ if(el) el.textContent="AI narrative unavailable — see the structured analysis below."; }
}

/* ─── PDF GENERATION ─── */
async function generatePDF(name, dims, overall, verdict, reasons, actions, percentiles){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
  const W=210, ml=20, mr=20, cw=W-ml-mr;
  let y=20;

  const ind=INDUSTRIES.find(x=>x.id===answers.industry);
  const indName=ind?ind.name:"General";

  // Header bar
  doc.setFillColor(83,58,183);
  doc.rect(0,0,W,38,"F");
  doc.setTextColor(255,255,255);
  doc.setFontSize(18); doc.setFont("helvetica","bold");
  doc.text("Stay vs Switch Analysis",ml,16);
  doc.setFontSize(10); doc.setFont("helvetica","normal");
  doc.text(`Prepared for: ${name}  ·  Industry: ${indName}  ·  ${new Date().toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}`,ml,26);
  doc.setFontSize(9);
  doc.text("Career decision framework for early professionals",ml,34);
  y=50;

  // Verdict box
  const vColors={stay:[232,243,224],switch:[243,232,224],borderline:[240,237,248]};
  const vc=vColors[verdict.v]||vColors.borderline;
  doc.setFillColor(...vc);
  doc.roundedRect(ml,y,cw,28,3,3,"F");
  doc.setTextColor(40,40,40);
  doc.setFontSize(13); doc.setFont("helvetica","bold");
  doc.text(verdict.title,ml+8,y+10);
  doc.setFontSize(9); doc.setFont("helvetica","normal");
  doc.setTextColor(80,80,80);
  const subLines=doc.splitTextToSize(verdict.sub,cw-16);
  doc.text(subLines,ml+8,y+18);
  doc.setFontSize(14); doc.setFont("helvetica","bold");
  doc.setTextColor(83,58,183);
  doc.text(`${overall}/10`,ml+cw-22,y+14);
  y+=36;

  // Dimension scores
  doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(40,40,40);
  doc.text("Dimension Scores vs Industry Benchmark",ml,y); y+=6;
  doc.setDrawColor(224,222,214); doc.setLineWidth(0.3);
  doc.line(ml,y,ml+cw,y); y+=6;

  const bench=BENCHMARKS[answers.industry||"tech"];
  const dimList=Object.entries(dims);
  dimList.forEach(([name,val])=>{
    const bv=bench[name]||5;
    doc.setFontSize(9); doc.setFont("helvetica","normal"); doc.setTextColor(60,60,60);
    doc.text(name,ml,y+4);
    // User bar
    const barX=ml+32, barW=cw-60, barH=4;
    doc.setFillColor(220,220,220);
    doc.roundedRect(barX,y,barW,barH,1,1,"F");
    const hexToRgb=h=>{const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];};
    const [r2,g2,b2]=hexToRgb(DIM_COLORS[name]||"#533ab7");
    doc.setFillColor(r2,g2,b2);
    doc.roundedRect(barX,y,(val/10)*barW,barH,1,1,"F");
    // Benchmark marker
    doc.setFillColor(120,120,120);
    doc.rect(barX+(bv/10)*barW-0.5,y-1,1,barH+2,"F");
    doc.setFontSize(8); doc.setTextColor(83,58,183);
    doc.text(`${val.toFixed(1)}`,barX+barW+3,y+4);
    doc.setTextColor(140,140,140);
    doc.text(`avg:${bv}`,barX+barW+14,y+4);
    y+=9;
  });
  doc.setFontSize(7.5); doc.setTextColor(140,140,140);
  doc.text("■ Purple bar = your score   │  grey marker = industry average",ml,y); y+=8;

  // Percentiles
  doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(40,40,40);
  doc.text("Percentile Ranking vs Industry",ml,y); y+=6;
  doc.setDrawColor(224,222,214); doc.line(ml,y,ml+cw,y); y+=6;
  const pctEntries=Object.entries(percentiles);
  const cols=3, cellW=cw/cols;
  pctEntries.forEach(([k,v],i)=>{
    const cx=ml+(i%cols)*cellW, cy=y+Math.floor(i/cols)*16;
    doc.setFillColor(245,243,252);
    doc.roundedRect(cx,cy,cellW-3,13,2,2,"F");
    doc.setFontSize(13); doc.setFont("helvetica","bold");
    doc.setTextColor(v>=70?15:v>=50?83:153, v>=70?110:v>=50?58:60, v>=70?86:v>=50?183:29);
    doc.text(`${v}th`,cx+4,cy+8);
    doc.setFontSize(7.5); doc.setFont("helvetica","normal"); doc.setTextColor(100,100,100);
    doc.text(k,cx+4,cy+12);
  });
  y+=Math.ceil(pctEntries.length/cols)*16+6;

  // AI narrative
  if(aiNarrative&&aiNarrative.length>10){
    doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(40,40,40);
    doc.text("AI Career Coaching",ml,y); y+=6;
    doc.setDrawColor(224,222,214); doc.line(ml,y,ml+cw,y); y+=5;
    doc.setFillColor(240,237,248);
    const narLines=doc.splitTextToSize(aiNarrative,cw-8);
    const narH=narLines.length*4.5+8;
    if(y+narH>270){ doc.addPage(); y=20; }
    doc.roundedRect(ml,y,cw,narH,3,3,"F");
    doc.setFontSize(8.5); doc.setFont("helvetica","normal"); doc.setTextColor(50,40,90);
    doc.text(narLines,ml+4,y+7);
    y+=narH+8;
  }

  // Key signals
  if(y>250){ doc.addPage(); y=20; }
  doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(40,40,40);
  doc.text("Key Signals",ml,y); y+=6;
  doc.setDrawColor(224,222,214); doc.line(ml,y,ml+cw,y); y+=5;
  reasons.slice(0,5).forEach(r=>{
    const typeColor=r.type==="stay"?[15,110,86]:[153,60,29];
    doc.setFillColor(r.type==="stay"?232:243, r.type==="stay"?243:232, r.type==="stay"?224:224);
    const rLines=doc.splitTextToSize(`${r.cat}: ${r.text}`,cw-10);
    const rH=rLines.length*4.2+7;
    if(y+rH>275){ doc.addPage(); y=20; }
    doc.roundedRect(ml,y,cw,rH,2,2,"F");
    doc.setFontSize(7.5); doc.setFont("helvetica","bold"); doc.setTextColor(...typeColor);
    doc.text(`${r.type==="stay"?"✓ Stay":"→ Switch"} · ${r.cat}`,ml+4,y+5);
    doc.setFont("helvetica","normal"); doc.setTextColor(50,50,50);
    doc.text(rLines,ml+4,y+10);
    y+=rH+4;
  });

  // Actions
  if(y>245){ doc.addPage(); y=20; }
  y+=4;
  doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(40,40,40);
  doc.text("Your Next Moves",ml,y); y+=6;
  doc.setDrawColor(224,222,214); doc.line(ml,y,ml+cw,y); y+=5;
  actions.forEach((a,i)=>{
    const aLines=doc.splitTextToSize(a,cw-12);
    const aH=aLines.length*4.2+7;
    if(y+aH>275){ doc.addPage(); y=20; }
    doc.setFillColor(248,247,252);
    doc.roundedRect(ml,y,cw,aH,2,2,"F");
    doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(83,58,183);
    doc.text(`${i+1}`,ml+4,y+5);
    doc.setFont("helvetica","normal"); doc.setTextColor(50,50,50); doc.setFontSize(8.5);
    doc.text(aLines,ml+10,y+5);
    y+=aH+4;
  });

  // Footer
  const pageCount=doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setFillColor(245,244,240);
    doc.rect(0,287,W,10,"F");
    doc.setFontSize(7.5); doc.setFont("helvetica","normal"); doc.setTextColor(140,140,140);
    doc.text("Stay vs Switch Analyser · Career decision framework for early professionals",ml,293);
    doc.text(`Page ${i} of ${pageCount}`,W-mr-18,293);
  }

  return doc;
}

/* ─── DOWNLOAD HANDLER ─── */
async function handleDownload(){
  const name=document.getElementById("dl-name").value.trim();
  const wa=document.getElementById("dl-wa").value.trim();
  const email=document.getElementById("dl-email").value.trim();
  let valid=true;

  document.querySelectorAll(".form-err").forEach(e=>e.textContent="");
  document.querySelectorAll(".form-input").forEach(e=>e.classList.remove("err"));

  if(!name){ document.getElementById("err-name").textContent="Please enter your name."; document.getElementById("dl-name").classList.add("err"); valid=false; }
  if(!wa||wa.length<8){ document.getElementById("err-wa").textContent="Please enter a valid WhatsApp number."; document.getElementById("dl-wa").classList.add("err"); valid=false; }
  if(!email||!email.includes("@")){ document.getElementById("err-email").textContent="Please enter a valid email address."; document.getElementById("dl-email").classList.add("err"); valid=false; }
  if(!valid) return;

  const btn=document.getElementById("dl-btn");
  btn.disabled=true;
  btn.innerHTML=`<span class="dots"><span>.</span><span>.</span><span>.</span></span> Generating PDF...`;

  const {overall,dims}=computeScore();
  const verdict=getVerdict(overall);
  const reasons=generateReasons(dims,overall);
  const actions=generateActions(dims,verdict.v);
  const percentiles=computePercentiles(dims,overall);
  const ind=INDUSTRIES.find(x=>x.id===answers.industry);

  // Wait for AI narrative if still loading
  await new Promise(res=>setTimeout(res,300));
  const aiEl=document.getElementById("ai-text");
  if(aiEl&&aiEl.querySelector(".dots")) await new Promise(res=>setTimeout(res,2000));
  aiNarrative=aiEl?aiEl.textContent||"":"";

  try{
    const doc=await generatePDF(name,dims,overall,verdict,reasons,actions,percentiles);
    doc.save(`Stay-Switch-Report-${name.replace(/\s+/g,"-")}.pdf`);

    // Send notification via Formspree
    await fetch(FORMSPREE_ENDPOINT,{
      method:"POST",
      headers:{"Content-Type":"application/json","Accept":"application/json"},
      body:JSON.stringify({
        name,
        whatsapp:wa,
        email,
        industry:ind?ind.name:"N/A",
        verdict:verdict.title,
        overall_score:`${overall}/10`,
        tenure:answers.tenure||"N/A",
        _subject:`New Stay vs Switch Report — ${name} (${ind?ind.name:"N/A"})`
      })
    });

    btn.disabled=false;
    btn.innerHTML=`<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PDF Report`;
    const suc=document.getElementById("dl-success");
    if(suc) suc.style.display="block";
  }catch(e){
    btn.disabled=false;
    btn.innerHTML=`Download PDF Report`;
    alert("Something went wrong generating the PDF. Please try again.");
  }
}

/* ─── SHARE ─── */
function buildShareURL(ans){ return window.location.href.split("?")[0]+"?d="+encodeURIComponent(btoa(JSON.stringify(ans))); }
function copyShare(){
  navigator.clipboard.writeText(document.getElementById("share-url").value).then(()=>{
    const el=document.getElementById("copy-confirm");
    if(el){ el.textContent="✓ Link copied to clipboard"; setTimeout(()=>{ if(el) el.textContent=""; },2500); }
  });
}

function loadFromURL(){
  const p=new URLSearchParams(window.location.search);
  if(p.get("d")){ try{ answers=JSON.parse(atob(decodeURIComponent(p.get("d")))); step=STEPS.length; isSharedView=true; return true; }catch(e){} }
  return false;
}

function restart(){ step=0; answers={}; aiNarrative=""; isSharedView=false; if(chartInstance){ chartInstance.destroy(); chartInstance=null; } initStepBar(); render(); window.scrollTo({top:0,behavior:"smooth"}); }

/* ─── INIT ─── */
initStepBar();
loadFromURL();
render();
</script>
