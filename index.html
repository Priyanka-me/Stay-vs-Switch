<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stay vs Switch Analyser</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;font-size:15px}
.app{max-width:680px;margin:0 auto;padding:20px 14px 60px}
.hdr{text-align:center;margin-bottom:24px}
.hdr h1{font-size:22px;font-weight:700;margin-bottom:4px}
.hdr p{font-size:13px;color:#666}
.badge{display:inline-block;font-size:10px;font-weight:600;background:#eee;color:#444;padding:2px 10px;border-radius:99px;margin-bottom:8px;letter-spacing:.05em;text-transform:uppercase}
.pbar{display:flex;gap:3px;margin-bottom:20px}
.pd{flex:1;height:3px;border-radius:2px;background:#ddd}
.pd.done{background:#533ab7}
.pd.active{background:#9b8fe0}
.card{background:#fff;border:1px solid #e0ded6;border-radius:12px;padding:16px;margin-bottom:12px}
.card h2{font-size:15px;font-weight:600;margin-bottom:14px;color:#111}
.qlabel{font-size:13px;font-weight:500;color:#333;margin-bottom:4px}
.qhint{font-size:11px;color:#999;margin-bottom:6px}
.srow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.srow input[type=range]{flex:1;accent-color:#533ab7}
.sval{font-size:14px;font-weight:700;color:#533ab7;min-width:20px;text-align:right}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.pill{font-size:12px;padding:6px 12px;border-radius:99px;border:1px solid #ccc;background:#f9f9f7;cursor:pointer;color:#444}
.pill.on{background:#533ab7;color:#fff;border-color:#533ab7}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.icard{border:1px solid #ccc;border-radius:10px;padding:10px;cursor:pointer;background:#f9f9f7;text-align:center;font-size:13px;font-weight:500;color:#333}
.icard.on{border-color:#533ab7;background:#eeebfa;color:#533ab7}
.nav{display:flex;gap:10px;margin-top:16px}
.btn{flex:1;padding:11px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none}
.btnb{background:#eee;color:#333}
.btnn{background:#533ab7;color:#fff}
.btnn:disabled{background:#b8ace0;cursor:default}

/* results */
.vcard{border-radius:12px;padding:20px;margin-bottom:12px;text-align:center}
.vstay{background:#e4f0dc;border:1px solid #9dd07e}
.vswitch{background:#f3e5dc;border:1px solid #e0a07e}
.vborder{background:#eeeafa;border:1px solid #b0a0e0}
.vtag{font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;opacity:.6;margin-bottom:4px}
.vtitle{font-size:23px;font-weight:700;margin-bottom:6px}
.vsub{font-size:13px;opacity:.7;line-height:1.6}
.vscore{font-size:19px;font-weight:700;margin-top:10px}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc{background:#f9f9f7;border:1px solid #e5e3da;border-radius:10px;padding:10px}
.scn{font-size:11px;color:#777;margin-bottom:3px}
.scb{background:#e8e6de;border-radius:99px;height:5px;margin-bottom:3px}
.scf{height:5px;border-radius:99px}
.scv{font-size:12px;font-weight:600;color:#333}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}
.pc{background:#f5f3fd;border:1px solid #ddd;border-radius:10px;padding:8px;text-align:center}
.pn{font-size:17px;font-weight:700}
.pl{font-size:10px;color:#888;margin-top:1px}
.sigs{background:#fff;border:1px solid #e0ded6;border-radius:12px;padding:14px;margin-bottom:12px}
.sig{padding:7px 0;border-bottom:1px solid #f2f0e8}
.sig:last-child{border:none}
.sigcat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.sigstay{color:#2a7d3f}
.sigswitch{color:#a03020}
.sigtxt{font-size:13px;color:#333;line-height:1.55}
.acts{background:#fff;border:1px solid #e0ded6;border-radius:12px;padding:14px;margin-bottom:12px}
.act{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid #f2f0e8;font-size:13px;color:#333;line-height:1.5}
.act:last-child{border:none}
.actn{font-size:12px;font-weight:700;color:#533ab7;flex-shrink:0;margin-top:1px}
.aibox{background:#eeebfa;border:1px solid #c0b4e8;border-radius:12px;padding:14px;margin-bottom:12px}
.aihead{font-size:11px;font-weight:700;color:#3c3090;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.aitxt{font-size:13px;color:#2a2060;line-height:1.65}
.dlform{background:#fff;border:1px solid #e0ded6;border-radius:12px;padding:16px;margin-bottom:12px}
.dlform h3{font-size:14px;font-weight:600;margin-bottom:4px}
.dlform p{font-size:12px;color:#888;margin-bottom:12px}
.fl{margin-bottom:10px}
.fl label{display:block;font-size:12px;font-weight:500;color:#333;margin-bottom:4px}
.fl input{width:100%;padding:9px 11px;border:1px solid #ccc;border-radius:8px;font-size:13px;background:#f9f9f7;outline:none}
.fl input:focus{border-color:#533ab7}
.fl input.err{border-color:#d04040}
.ferr{font-size:11px;color:#d04040;margin-top:2px}
.dlbtn{width:100%;padding:11px;border-radius:10px;background:#533ab7;color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
.dlbtn:disabled{background:#b8ace0}
.dlok{display:none;margin-top:10px;padding:10px 12px;background:#e4f0dc;border-radius:8px;font-size:13px;color:#2a7d3f;border:1px solid #9dd07e}
.sharebox{background:#fff;border:1px solid #e0ded6;border-radius:12px;padding:14px;margin-bottom:12px}
.sharebox h3{font-size:14px;font-weight:600;margin-bottom:4px}
.sharebox p{font-size:12px;color:#888;margin-bottom:8px}
.srow2{display:flex;gap:8px}
.surl{flex:1;padding:8px 10px;border:1px solid #ccc;border-radius:8px;font-size:11px;color:#333;background:#f9f9f7;font-family:monospace}
.sbtn{padding:8px 14px;border-radius:8px;background:#533ab7;color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer}
.copyok{font-size:11px;color:#2a7d3f;margin-top:4px;min-height:14px}
.restbtn{width:100%;padding:11px;border-radius:10px;background:#eee;border:none;font-size:14px;font-weight:500;cursor:pointer;color:#333;margin-top:4px}
.fnote{font-size:11px;color:#aaa;text-align:center;margin:8px 0 12px;line-height:1.6}
.sharedbanner{background:#fff8e0;border:1px solid #f0c060;border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:13px;color:#705010}
@media(max-width:420px){.sgrid{grid-template-columns:1fr}.pgrid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="badge">Career Tool</div>
    <h1>Stay vs Switch Analyser</h1>
    <p>AI-powered · Benchmark data · PDF report</p>
  </div>
  <div class="pbar" id="pbar"></div>
  <div id="main"></div>
</div>

<script>
var FORMSPREE = "https://formspree.io/f/mykagdao";

var IND = [
  {id:"tech",    name:"Tech / SaaS",       mods:{skill_growth:1.1,skills_demand:1.2,salary_vs_market:1.1}},
  {id:"finance", name:"Finance / Banking", mods:{raise_trajectory:1.15,company_stability:1.1}},
  {id:"consult", name:"Consulting",        mods:{mentorship:1.15,skill_growth:1.1}},
  {id:"startup", name:"Startup",           mods:{skill_growth:1.2,company_stability:0.8,work_impact:1.15}},
  {id:"govt",    name:"Government / PSU",  mods:{company_stability:1.3,raise_trajectory:0.85,skills_demand:0.85}},
  {id:"mfg",     name:"Manufacturing",     mods:{company_stability:1.1,skills_demand:0.9}},
  {id:"health",  name:"Healthcare",        mods:{work_impact:1.2,skills_demand:1.05}},
  {id:"media",   name:"Media / Creative",  mods:{work_impact:1.1,salary_vs_market:0.9}}
];

var BENCH = {
  tech:    {Compensation:6.8,Growth:6.5,Role:6.2,Culture:5.9,Market:7.4,Overall:6.6},
  finance: {Compensation:7.2,Growth:5.8,Role:5.6,Culture:5.3,Market:6.1,Overall:6.1},
  consult: {Compensation:6.4,Growth:6.9,Role:6.0,Culture:5.5,Market:6.8,Overall:6.4},
  startup: {Compensation:5.9,Growth:7.3,Role:6.8,Culture:6.2,Market:7.0,Overall:6.7},
  govt:    {Compensation:5.5,Growth:4.8,Role:5.2,Culture:6.1,Market:4.2,Overall:5.3},
  mfg:     {Compensation:6.1,Growth:5.3,Role:5.5,Culture:5.8,Market:5.0,Overall:5.6},
  health:  {Compensation:6.3,Growth:5.9,Role:6.5,Culture:5.4,Market:6.3,Overall:6.1},
  media:   {Compensation:5.4,Growth:6.1,Role:6.3,Culture:6.0,Market:5.8,Overall:5.9}
};

var DC = {Compensation:"#533ab7",Growth:"#1d9e75",Role:"#ba7517",Culture:"#993556",Market:"#185fa5"};

var STEPS = [
  {
    title:"Your Profile",
    qs:[
      {id:"industry", label:"Which industry are you in?", type:"industry"},
      {id:"tenure",   label:"How long in this role?", type:"pills",
       opts:["Under 6 months","6 to 12 months","1 to 2 years","Over 2 years"]}
    ]
  },
  {
    title:"Compensation and Benefits",
    qs:[
      {id:"salary_vs_market", label:"Salary vs market rate?", hint:"0=far below  10=far above", type:"slider"},
      {id:"raise_trajectory", label:"Annual raise trajectory?", hint:"0=flat  10=15%+ per year", type:"slider"},
      {id:"benefits_quality", label:"Benefits quality?", hint:"0=poor  10=excellent", type:"slider"}
    ]
  },
  {
    title:"Growth and Learning",
    qs:[
      {id:"skill_growth",      label:"Speed of building marketable skills?", hint:"0=stagnant  10=fast", type:"slider"},
      {id:"mentorship",        label:"Quality of mentorship and feedback?", hint:"0=none  10=excellent", type:"slider"},
      {id:"promotion_clarity", label:"Clarity of promotion path?", type:"pills",
       opts:["No path","Vague","Clear 12-18 months","On track"]}
    ]
  },
  {
    title:"Role and Impact",
    qs:[
      {id:"role_clarity", label:"Clarity of your role and responsibilities?", hint:"0=chaotic  10=crystal clear", type:"slider"},
      {id:"work_impact",  label:"How meaningful is your work?", hint:"0=invisible  10=high impact", type:"slider"},
      {id:"visibility",   label:"Do leaders know your contributions?", type:"pills",
       opts:["Not at all","Somewhat","Yes regularly","Very well known"]}
    ]
  },
  {
    title:"Manager and Culture",
    qs:[
      {id:"manager_quality", label:"Manager quality?", hint:"0=toxic  10=excellent", type:"slider"},
      {id:"psych_safety",    label:"Can you speak up freely?", hint:"0=no  10=fully safe", type:"slider"},
      {id:"burnout_risk",    label:"Current burnout level?", hint:"0=none  10=burned out", type:"slider"}
    ]
  },
  {
    title:"Market and Stability",
    qs:[
      {id:"skills_demand",     label:"How in-demand are your skills?", hint:"0=low  10=very hot", type:"slider"},
      {id:"company_stability", label:"Company financial stability?", hint:"0=at risk  10=very strong", type:"slider"}
    ]
  }
];

var PV = {
  tenure:{"Under 6 months":3,"6 to 12 months":5,"1 to 2 years":7,"Over 2 years":9},
  promotion_clarity:{"No path":1,"Vague":4,"Clear 12-18 months":7,"On track":10},
  visibility:{"Not at all":1,"Somewhat":4,"Yes regularly":7,"Very well known":10}
};

var step = 0;
var ans = {};
var aiTxt = "";
var isShared = false;
var chartObj = null;

// set all slider defaults upfront
function setDefaults() {
  for (var si = 0; si < STEPS.length; si++) {
    var qs = STEPS[si].qs;
    for (var qi = 0; qi < qs.length; qi++) {
      var q = qs[qi];
      if (q.type === "slider" && ans[q.id] === undefined) {
        ans[q.id] = 5;
      }
    }
  }
}

function getInd() {
  for (var i = 0; i < IND.length; i++) {
    if (IND[i].id === ans.industry) return IND[i];
  }
  return null;
}

function mod(val, key) {
  var ind = getInd();
  if (ind && ind.mods && ind.mods[key]) {
    return Math.min(10, val * ind.mods[key]);
  }
  return val;
}

function calcScore() {
  var prom = (PV.promotion_clarity[ans.promotion_clarity]) || 5;
  var vis  = (PV.visibility[ans.visibility]) || 5;

  var dims = {};
  dims.Compensation = Math.min(10, mod(ans.salary_vs_market||5,"salary_vs_market")*0.5 + mod(ans.raise_trajectory||5,"raise_trajectory")*0.3 + mod(ans.benefits_quality||5,"benefits_quality")*0.2);
  dims.Growth       = Math.min(10, mod(ans.skill_growth||5,"skill_growth")*0.45 + mod(ans.mentorship||5,"mentorship")*0.25 + mod(prom,"promotion_clarity")*0.30);
  dims.Role         = Math.min(10, mod(ans.role_clarity||5,"role_clarity")*0.35 + mod(ans.work_impact||5,"work_impact")*0.40 + mod(vis,"visibility")*0.25);
  var bi            = 10 - mod(ans.burnout_risk||5,"burnout_risk");
  dims.Culture      = Math.min(10, mod(ans.manager_quality||5,"manager_quality")*0.45 + mod(ans.psych_safety||5,"psych_safety")*0.30 + bi*0.25);
  dims.Market       = Math.min(10, mod(ans.skills_demand||5,"skills_demand")*0.55 + mod(ans.company_stability||5,"company_stability")*0.45);

  var keys = Object.keys(dims);
  for (var k = 0; k < keys.length; k++) {
    dims[keys[k]] = Math.round(dims[keys[k]] * 10) / 10;
  }
  var overall = dims.Compensation*0.20 + dims.Growth*0.28 + dims.Role*0.18 + dims.Culture*0.22 + dims.Market*0.12;
  return { overall: Math.round(overall*10)/10, dims: dims };
}

function getVerdict(s) {
  if (s >= 6.8) return {v:"stay",    tag:"Recommendation", title:"Stay and Optimise",  sub:"Your current role has more to give. Focus on the gaps below.", cls:"vstay",   col:"#0f6e56"};
  if (s <= 4.2) return {v:"switch",  tag:"Recommendation", title:"Start Looking",       sub:"The signals are pointing outward. It is time to explore.",    cls:"vswitch", col:"#993c1d"};
  return              {v:"borderline",tag:"Borderline Call", title:"It Depends",         sub:"Some dimensions pull you out, others anchor you in.",          cls:"vborder", col:"#3c3489"};
}

function calcPct(dims, overall) {
  var bench = BENCH[ans.industry || "tech"] || BENCH.tech;
  var all = {Compensation:dims.Compensation, Growth:dims.Growth, Role:dims.Role, Culture:dims.Culture, Market:dims.Market, Overall:overall};
  var pcts = {};
  var keys = Object.keys(all);
  for (var i = 0; i < keys.length; i++) {
    var k = keys[i];
    var diff = (all[k] - (bench[k] || 5)) / 2.5;
    pcts[k] = Math.min(99, Math.max(1, Math.round(50 + diff * 20)));
  }
  return pcts;
}

function getSigs(dims, overall) {
  var r = [];
  var C=dims.Compensation, G=dims.Growth, Ro=dims.Role, Cu=dims.Culture, M=dims.Market;
  if (G  >= 7.5) r.push({cat:"Growth",       txt:"You are learning fast. Leaving now interrupts compounding career capital that takes years to rebuild.", tp:"stay"});
  if (Cu >= 7.5) r.push({cat:"Culture",       txt:"Good manager and psychological safety is rare. These assets are easy to lose and hard to find again.", tp:"stay"});
  if (C  >= 7.5) r.push({cat:"Compensation",  txt:"You are paid competitively. A switch might offer a small bump but could sacrifice other strengths.", tp:"stay"});
  if (Ro >= 7)   r.push({cat:"Impact",        txt:"Clear impact and visibility drive internal promotions. You are well placed to build your portfolio here.", tp:"stay"});
  if (ans.tenure === "Under 6 months") r.push({cat:"Timing", txt:"Leaving before 12 months signals instability. Consider crossing that threshold first.", tp:"stay"});
  if (G  < 4.5)  r.push({cat:"Growth",        txt:"Skill growth is stagnant. Every month here widens the gap with peers who are compounding faster.", tp:"switch"});
  if (Cu < 4)    r.push({cat:"Culture",        txt:"Low psychological safety and a difficult manager caps your potential and increases burnout risk.", tp:"switch"});
  if (C  < 4)    r.push({cat:"Compensation",   txt:"You are likely underpaid. Early-career switching premiums are often 20 to 40 percent.", tp:"switch"});
  if (M  >= 7.5) r.push({cat:"Market",         txt:"Your skills are in high demand. Leverage is highest when the market wants you - use it now.", tp:"switch"});
  if ((ans.burnout_risk||5) >= 7) r.push({cat:"Wellbeing", txt:"High burnout at this stage can derail years of progress. Your energy is career capital too.", tp:"switch"});
  if ((ans.company_stability||5) <= 4) r.push({cat:"Stability", txt:"Company stability looks precarious. Better to leave on your terms than be caught in a layoff.", tp:"switch"});
  var stay = r.filter(function(x){return x.tp==="stay";});
  var sw   = r.filter(function(x){return x.tp==="switch";});
  return overall >= 5.5 ? stay.concat(sw) : sw.concat(stay);
}

function getActs(dims, v) {
  var a = [];
  if (v === "stay" || v === "borderline") {
    if (dims.Compensation < 6) a.push("Research market salary and prepare a compensation review conversation with your manager within 90 days.");
    if (dims.Growth       < 6) a.push("Identify one stretch project this quarter that builds a skill gap. Ask your manager explicitly for it.");
    if (dims.Culture      < 6) a.push("Have a direct career-trajectory conversation with your manager. How they respond will tell you a lot.");
    a.push("Set a 6-month checkpoint. Revisit this analysis if nothing has materially improved.");
  }
  if (v === "switch" || v === "borderline") {
    if (dims.Market >= 6)       a.push("Update your resume and LinkedIn now. Your skills are in demand. Apply before you are in a desperate position.");
    a.push("Talk to 3 people in roles you want. Informational interviews surface opportunities and calibrate expectations.");
    a.push("Give yourself a 90-day search runway. Start while still employed to maximise your leverage.");
    if (ans.tenure === "Under 6 months") a.push("If possible, cross the 12-month mark first to avoid the job-hopper signal on your profile.");
  }
  return a.slice(0, 4);
}

/* ---------- UI ---------- */
function initBar() {
  var bar = document.getElementById("pbar");
  var html = "";
  for (var i = 0; i < STEPS.length; i++) {
    html += '<div class="pd" id="pd' + i + '"></div>';
  }
  bar.innerHTML = html;
}

function updateBar() {
  for (var i = 0; i < STEPS.length; i++) {
    var d = document.getElementById("pd" + i);
    if (!d) continue;
    if (i < step)       d.className = "pd done";
    else if (i === step) d.className = "pd active";
    else                 d.className = "pd";
  }
}

function render() {
  updateBar();
  if (step < STEPS.length) {
    showStep();
  } else {
    showResult();
  }
}

function showStep() {
  var s = STEPS[step];
  var html = '<div class="card"><h2>' + s.title + '</h2>';

  for (var qi = 0; qi < s.qs.length; qi++) {
    var q = s.qs[qi];
    html += '<div class="qlabel">' + q.label + '</div>';
    if (q.hint) html += '<div class="qhint">' + q.hint + '</div>';

    if (q.type === "industry") {
      html += '<div class="igrid">';
      for (var ii = 0; ii < IND.length; ii++) {
        var ind = IND[ii];
        var on = (ans.industry === ind.id) ? " on" : "";
        html += '<div class="icard' + on + '" onclick="pickInd(\'' + ind.id + '\')">' + ind.name + '</div>';
      }
      html += '</div>';

    } else if (q.type === "slider") {
      var val = (ans[q.id] !== undefined) ? ans[q.id] : 5;
      html += '<div class="srow">'
            + '<input type="range" min="0" max="10" step="1" value="' + val + '" '
            + 'oninput="setSlider(\'' + q.id + '\',this.value)">'
            + '<span class="sval" id="sv_' + q.id + '">' + val + '</span>'
            + '</div>';

    } else if (q.type === "pills") {
      html += '<div class="pills">';
      for (var oi = 0; oi < q.opts.length; oi++) {
        var o = q.opts[oi];
        var on2 = (ans[q.id] === o) ? " on" : "";
        html += '<div class="pill' + on2 + '" onclick="setPill(\'' + q.id + '\',\'' + o + '\')">' + o + '</div>';
      }
      html += '</div>';
    }
  }
  html += '</div>';

  html += '<div class="nav">';
  if (step > 0) html += '<button class="btn btnb" onclick="goBack()">Back</button>';
  var isLast = (step === STEPS.length - 1);
  var btnTxt = isLast ? "See My Result" : "Next";
  html += '<button class="btn btnn" id="nxtBtn" onclick="goNext()">' + btnTxt + '</button>';
  html += '</div>';

  document.getElementById("main").innerHTML = html;
  checkBtn();
}

function canProceed() {
  var s = STEPS[step];
  for (var i = 0; i < s.qs.length; i++) {
    var q = s.qs[i];
    if (q.type === "slider") continue; // always has default
    if (!ans[q.id]) return false;
  }
  return true;
}

function checkBtn() {
  var btn = document.getElementById("nxtBtn");
  if (btn) btn.disabled = !canProceed();
}

function pickInd(id) {
  ans.industry = id;
  showStep();
}

function setSlider(id, val) {
  ans[id] = parseInt(val, 10);
  var el = document.getElementById("sv_" + id);
  if (el) el.textContent = val;
}

function setPill(id, val) {
  ans[id] = val;
  showStep();
}

function goBack() {
  if (step > 0) { step--; render(); window.scrollTo(0,0); }
}

function goNext() {
  if (!canProceed()) return;
  // ensure slider defaults saved
  var s = STEPS[step];
  for (var i = 0; i < s.qs.length; i++) {
    var q = s.qs[i];
    if (q.type === "slider" && ans[q.id] === undefined) ans[q.id] = 5;
  }
  step++;
  render();
  window.scrollTo(0, 0);
}

/* ---------- RESULT ---------- */
function showResult() {
  var res  = calcScore();
  var dims = res.dims;
  var ovr  = res.overall;
  var verd = getVerdict(ovr);
  var sigs = getSigs(dims, ovr);
  var acts = getActs(dims, verd.v);
  var pcts = calcPct(dims, ovr);
  var ind  = getInd();
  var shareURL = makeShareURL();

  var html = "";

  if (isShared) {
    html += '<div class="sharedbanner">Viewing a shared result. <a href="' + window.location.href.split("?")[0] + '" style="color:#533ab7">Take your own</a></div>';
  }

  // verdict
  html += '<div class="vcard ' + verd.cls + '">'
        + '<div class="vtag">' + verd.tag + '</div>'
        + '<div class="vtitle">' + verd.title + '</div>'
        + '<div class="vsub">' + verd.sub + '</div>'
        + '<div class="vscore" style="color:' + verd.col + '">' + ovr + ' / 10'
        + (ind ? ' &nbsp;-&nbsp; ' + ind.name : '') + '</div>'
        + '</div>';

  // AI coaching placeholder
  html += '<div class="aibox">'
        + '<div class="aihead">AI Career Coaching</div>'
        + '<div class="aitxt" id="aibox">Analysing your profile...</div>'
        + '</div>';

  // dimension scores
  html += '<div class="card"><h2 style="margin-bottom:10px">Your Scores</h2><div class="sgrid">';
  var dkeys = Object.keys(dims);
  for (var di = 0; di < dkeys.length; di++) {
    var dn = dkeys[di];
    var dv = dims[dn];
    html += '<div class="sc">'
          + '<div class="scn">' + dn + '</div>'
          + '<div class="scb"><div class="scf" style="width:' + Math.round(dv*10) + '%;background:' + (DC[dn]||"#533ab7") + '"></div></div>'
          + '<div class="scv">' + dv.toFixed(1) + ' / 10</div>'
          + '</div>';
  }
  html += '</div></div>';

  // benchmark
  var bench = BENCH[ans.industry || "tech"] || BENCH.tech;
  html += '<div class="card">'
        + '<h2 style="margin-bottom:2px">vs ' + (ind ? ind.name : "Industry") + ' Benchmark</h2>'
        + '<p style="font-size:11px;color:#999;margin-bottom:10px">Purple = you &nbsp;|&nbsp; Grey = industry average</p>';

  for (var bi = 0; bi < dkeys.length; bi++) {
    var bn = dkeys[bi];
    var bv = dims[bn];
    var bavg = bench[bn] || 5;
    html += '<div style="margin-bottom:10px">'
          + '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">'
          + '<span style="font-weight:500">' + bn + '</span>'
          + '<span style="color:#533ab7;font-weight:700">' + bv.toFixed(1) + '</span>'
          + '</div>'
          + '<div style="position:relative;height:8px;background:#e5e3da;border-radius:99px">'
          + '<div style="position:absolute;height:8px;width:' + Math.round(bv*10) + '%;background:' + (DC[bn]||"#533ab7") + ';border-radius:99px"></div>'
          + '<div style="position:absolute;height:12px;width:2px;background:#999;border-radius:1px;top:-2px;left:' + Math.round(bavg*10) + '%"></div>'
          + '</div>'
          + '<div style="font-size:10px;color:#aaa;margin-top:2px">Industry avg: ' + bavg + '</div>'
          + '</div>';
  }

  // percentiles
  html += '<div class="pgrid">';
  var pkeys = Object.keys(pcts);
  for (var pi = 0; pi < pkeys.length; pi++) {
    var pk = pkeys[pi];
    var pv = pcts[pk];
    var pc = pv >= 70 ? "#0f6e56" : pv >= 50 ? "#533ab7" : "#a03020";
    html += '<div class="pc"><div class="pn" style="color:' + pc + '">' + pv + 'th</div><div class="pl">' + pk + '</div></div>';
  }
  html += '</div></div>';

  // signals
  if (sigs.length) {
    html += '<div class="sigs"><h2 style="margin-bottom:8px">Key Signals</h2>';
    var maxSigs = Math.min(sigs.length, 5);
    for (var si2 = 0; si2 < maxSigs; si2++) {
      var sg = sigs[si2];
      html += '<div class="sig">'
            + '<div class="sigcat ' + (sg.tp==="stay" ? "sigstay" : "sigswitch") + '">'
            + sg.cat + ' - ' + (sg.tp==="stay" ? "Reason to stay" : "Reason to switch")
            + '</div>'
            + '<div class="sigtxt">' + sg.txt + '</div>'
            + '</div>';
    }
    html += '</div>';
  }

  // next moves
  html += '<div class="acts"><h2 style="margin-bottom:8px">Your Next Moves</h2>';
  for (var ai = 0; ai < acts.length; ai++) {
    html += '<div class="act"><span class="actn">' + (ai+1) + '</span><span>' + acts[ai] + '</span></div>';
  }
  html += '</div>';

  // download form
  html += '<div class="dlform">'
        + '<h3>Download your PDF Report</h3>'
        + '<p>Enter your details to download a personalised report.</p>'
        + '<div class="fl"><label>Full name *</label><input id="dlname" type="text" placeholder="e.g. Priya Sharma"><div class="ferr" id="en"></div></div>'
        + '<div class="fl"><label>WhatsApp number *</label><input id="dlwa" type="tel" placeholder="+91 98765 43210"><div class="ferr" id="ew"></div></div>'
        + '<div class="fl"><label>Email *</label><input id="dlemail" type="email" placeholder="you@example.com"><div class="ferr" id="ee"></div></div>'
        + '<button class="dlbtn" id="dlbtn" onclick="doDownload()">Download PDF Report</button>'
        + '<div class="dlok" id="dlok">PDF downloaded successfully!</div>'
        + '</div>';

  // share
  html += '<div class="sharebox">'
        + '<h3>Share your result</h3>'
        + '<p>Your answers are in the link. Nothing stored on any server.</p>'
        + '<div class="srow2"><input class="surl" id="surl" value="' + shareURL + '" readonly onclick="this.select()"><button class="sbtn" onclick="doShare()">Copy</button></div>'
        + '<div class="copyok" id="cok"></div>'
        + '</div>';

  html += '<div class="fnote">This is a framework for thinking, not a substitute for advice from a mentor or career coach.</div>';
  html += '<button class="restbtn" onclick="restart()">Start over</button>';

  document.getElementById("main").innerHTML = html;
  document.getElementById("pbar").innerHTML = "";
  for (var pi2 = 0; pi2 < STEPS.length; pi2++) {
    var d2 = document.createElement("div");
    d2.className = "pd done";
    document.getElementById("pbar").appendChild(d2);
  }

  // fetch AI
  doAI(dims, verd, ovr);
}

/* ---------- AI ---------- */
function doAI(dims, verd, overall) {
  var ind = getInd();
  var indName = ind ? ind.name : "a professional field";
  var prompt = "You are a career coach for early-career professionals in " + indName + ". "
    + "A professional completed a Stay vs Switch analysis. Scores out of 10: "
    + "Overall=" + overall + " Compensation=" + dims.Compensation + " Growth=" + dims.Growth
    + " Role=" + dims.Role + " Culture=" + dims.Culture + " Market=" + dims.Market
    + " Verdict=" + verd.title + " Tenure=" + (ans.tenure || "unknown") + ". "
    + "Write 3 short paragraphs of warm, direct career coaching (no headers, no bullets, under 180 words). "
    + "Para 1: What the numbers honestly reveal. "
    + "Para 2: Most important focus for the next 90 days (be specific to their scores). "
    + "Para 3: A motivating insight. Be honest, not generic.";

  fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 500,
      messages: [{role: "user", content: prompt}]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    var txt = "";
    if (d.content && d.content.length) {
      for (var i = 0; i < d.content.length; i++) {
        if (d.content[i].text) txt += d.content[i].text;
      }
    }
    var el = document.getElementById("aibox");
    if (el) { el.textContent = txt || "See the structured analysis above."; aiTxt = el.textContent; }
  })
  .catch(function() {
    var el = document.getElementById("aibox");
    if (el) el.textContent = "AI narrative unavailable. See the structured analysis above.";
  });
}

/* ---------- PDF ---------- */
function doDownload() {
  var name  = (document.getElementById("dlname").value || "").trim();
  var wa    = (document.getElementById("dlwa").value || "").trim();
  var email = (document.getElementById("dlemail").value || "").trim();
  var ok = true;

  document.getElementById("en").textContent = "";
  document.getElementById("ew").textContent = "";
  document.getElementById("ee").textContent = "";
  document.getElementById("dlname").classList.remove("err");
  document.getElementById("dlwa").classList.remove("err");
  document.getElementById("dlemail").classList.remove("err");

  if (!name)  { document.getElementById("en").textContent = "Enter your name."; document.getElementById("dlname").classList.add("err"); ok = false; }
  if (wa.length < 6) { document.getElementById("ew").textContent = "Enter WhatsApp number."; document.getElementById("dlwa").classList.add("err"); ok = false; }
  if (!email || email.indexOf("@") < 0) { document.getElementById("ee").textContent = "Enter valid email."; document.getElementById("dlemail").classList.add("err"); ok = false; }
  if (!ok) return;

  var btn = document.getElementById("dlbtn");
  btn.disabled = true;
  btn.textContent = "Generating...";

  // wait briefly for AI then generate
  setTimeout(function() {
    var aiEl = document.getElementById("aibox");
    if (aiEl && aiEl.textContent) aiTxt = aiEl.textContent;
    buildAndSavePDF(name, wa, email);
  }, 500);
}

function buildAndSavePDF(name, wa, email) {
  try {
    var jsPDF = window.jspdf ? window.jspdf.jsPDF : null;
    if (!jsPDF) { alert("PDF library not loaded. Please refresh and try again."); return; }

    var doc = new jsPDF({orientation:"portrait", unit:"mm", format:"a4"});
    var W = 210, ml = 18, cw = 174;
    var y = 20;
    var res  = calcScore();
    var dims = res.dims;
    var ovr  = res.overall;
    var verd = getVerdict(ovr);
    var sigs = getSigs(dims, ovr);
    var acts = getActs(dims, verd.v);
    var pcts = calcPct(dims, ovr);
    var ind  = getInd();
    var bench = BENCH[ans.industry || "tech"] || BENCH.tech;

    // Header
    doc.setFillColor(83,58,183);
    doc.rect(0,0,W,35,"F");
    doc.setTextColor(255,255,255);
    doc.setFontSize(16); doc.setFont("helvetica","bold");
    doc.text("Stay vs Switch Analysis", ml, 13);
    doc.setFontSize(9); doc.setFont("helvetica","normal");
    doc.text("For: " + name + "  |  " + (ind?ind.name:"General") + "  |  " + new Date().toLocaleDateString(), ml, 22);
    doc.text("Career decision framework for early professionals", ml, 30);
    y = 44;

    // Verdict
    var vbg = {stay:[228,240,220], switch:[243,228,220], borderline:[238,234,250]};
    var bg = vbg[verd.v] || vbg.borderline;
    doc.setFillColor(bg[0],bg[1],bg[2]);
    doc.roundedRect(ml, y, cw, 24, 3,3,"F");
    doc.setTextColor(40,40,40);
    doc.setFontSize(14); doc.setFont("helvetica","bold");
    doc.text(verd.title, ml+5, y+9);
    doc.setFontSize(8.5); doc.setFont("helvetica","normal"); doc.setTextColor(80,80,80);
    var subW = doc.splitTextToSize(verd.sub, cw-50);
    doc.text(subW, ml+5, y+17);
    doc.setFontSize(14); doc.setFont("helvetica","bold"); doc.setTextColor(83,58,183);
    doc.text(ovr+"/10", ml+cw-22, y+12);
    y += 31;

    // Scores
    doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(30,30,30);
    doc.text("Dimension Scores", ml, y); y+=5;
    doc.setDrawColor(220,218,210); doc.setLineWidth(0.3); doc.line(ml,y,ml+cw,y); y+=5;

    function hexRgb(h) { return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
    var dkeys = Object.keys(dims);
    for (var di = 0; di < dkeys.length; di++) {
      var dn = dkeys[di];
      var dv = dims[dn];
      var bavg = bench[dn] || 5;
      var bx=ml+30, bw=cw-52, bh=4;
      doc.setFontSize(8.5); doc.setFont("helvetica","normal"); doc.setTextColor(60,60,60);
      doc.text(dn, ml, y+3.5);
      doc.setFillColor(210,208,200);
      doc.roundedRect(bx, y, bw, bh, 1,1,"F");
      var rgb = hexRgb(DC[dn]||"#533ab7");
      doc.setFillColor(rgb[0],rgb[1],rgb[2]);
      doc.roundedRect(bx, y, (dv/10)*bw, bh, 1,1,"F");
      doc.setFillColor(90,90,90);
      doc.rect(bx+(bavg/10)*bw-0.5, y-1, 1, bh+2,"F");
      doc.setFontSize(8); doc.setTextColor(83,58,183);
      doc.text(dv.toFixed(1), bx+bw+2, y+3.5);
      doc.setTextColor(140,140,140);
      doc.text("avg:"+bavg, bx+bw+11, y+3.5);
      y += 9;
    }
    doc.setFontSize(7); doc.setTextColor(160,160,160);
    doc.text("Coloured bar = your score  |  grey marker = industry average", ml, y); y+=8;

    // Percentiles
    doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(30,30,30);
    doc.text("Percentile Rankings", ml, y); y+=5;
    doc.setDrawColor(220,218,210); doc.line(ml,y,ml+cw,y); y+=5;
    var pkeys = Object.keys(pcts);
    var cw3 = cw/3;
    for (var pi = 0; pi < pkeys.length; pi++) {
      var pk = pkeys[pi]; var pv = pcts[pk];
      var cx = ml + (pi%3)*cw3;
      var cy = y + Math.floor(pi/3)*16;
      doc.setFillColor(244,242,253);
      doc.roundedRect(cx, cy, cw3-3, 13, 2,2,"F");
      var pc = pv>=70?[15,110,86]:pv>=50?[83,58,183]:[160,48,32];
      doc.setFontSize(12); doc.setFont("helvetica","bold"); doc.setTextColor(pc[0],pc[1],pc[2]);
      doc.text(pv+"th", cx+3, cy+8);
      doc.setFontSize(7.5); doc.setFont("helvetica","normal"); doc.setTextColor(100,100,100);
      doc.text(pk, cx+3, cy+12);
    }
    y += Math.ceil(pkeys.length/3)*16 + 6;

    // AI
    var narTxt = aiTxt && aiTxt.length > 10 ? aiTxt.replace(/[^\x00-\xFF\n]/g,"").trim() : "";
    if (narTxt) {
      if(y > 252) { doc.addPage(); y = 18; }
      doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(30,30,30);
      doc.text("AI Career Coaching", ml, y); y+=5;
      doc.setDrawColor(220,218,210); doc.line(ml,y,ml+cw,y); y+=4;
      var nl = doc.splitTextToSize(narTxt, cw-6);
      var nh = nl.length*4.5+8;
      if(y+nh>272) { doc.addPage(); y=18; }
      doc.setFillColor(238,235,250);
      doc.roundedRect(ml, y, cw, nh, 3,3,"F");
      doc.setFontSize(8.5); doc.setFont("helvetica","normal"); doc.setTextColor(50,40,90);
      doc.text(nl, ml+4, y+7);
      y += nh+8;
    }

    // Signals
    if(y>250) { doc.addPage(); y=18; }
    doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(30,30,30);
    doc.text("Key Signals", ml, y); y+=5;
    doc.setDrawColor(220,218,210); doc.line(ml,y,ml+cw,y); y+=4;
    var maxS = Math.min(sigs.length, 5);
    for (var si = 0; si < maxS; si++) {
      var sg = sigs[si];
      var stayType = sg.tp === "stay";
      var sbg = stayType ? [228,240,220] : [243,228,220];
      var stc = stayType ? [15,110,86] : [160,48,32];
      var stxt = sg.txt.replace(/[^\x00-\xFF]/g,"");
      var sl = doc.splitTextToSize(stxt, cw-10);
      var sh = sl.length*4.2+9;
      if(y+sh>272) { doc.addPage(); y=18; }
      doc.setFillColor(sbg[0],sbg[1],sbg[2]);
      doc.roundedRect(ml, y, cw, sh, 2,2,"F");
      doc.setFontSize(7.5); doc.setFont("helvetica","bold"); doc.setTextColor(stc[0],stc[1],stc[2]);
      doc.text((stayType?"[STAY] ":"[SWITCH] ")+sg.cat, ml+3, y+5);
      doc.setFontSize(8.5); doc.setFont("helvetica","normal"); doc.setTextColor(50,50,50);
      doc.text(sl, ml+3, y+10);
      y += sh+4;
    }

    // Actions
    if(y>248) { doc.addPage(); y=18; }
    y += 3;
    doc.setFontSize(11); doc.setFont("helvetica","bold"); doc.setTextColor(30,30,30);
    doc.text("Your Next Moves", ml, y); y+=5;
    doc.setDrawColor(220,218,210); doc.line(ml,y,ml+cw,y); y+=4;
    for (var ai = 0; ai < acts.length; ai++) {
      var at = acts[ai].replace(/[^\x00-\xFF]/g,"");
      var al = doc.splitTextToSize(at, cw-14);
      var ah = al.length*4.2+8;
      if(y+ah>272) { doc.addPage(); y=18; }
      doc.setFillColor(248,246,255);
      doc.roundedRect(ml, y, cw, ah, 2,2,"F");
      doc.setFontSize(9); doc.setFont("helvetica","bold"); doc.setTextColor(83,58,183);
      doc.text(""+(ai+1), ml+3, y+6);
      doc.setFontSize(8.5); doc.setFont("helvetica","normal"); doc.setTextColor(50,50,50);
      doc.text(al, ml+10, y+6);
      y += ah+4;
    }

    // Footer
    var pages = doc.internal.getNumberOfPages();
    for (var p = 1; p <= pages; p++) {
      doc.setPage(p);
      doc.setFillColor(244,243,240);
      doc.rect(0,287,W,10,"F");
      doc.setFontSize(7); doc.setFont("helvetica","normal"); doc.setTextColor(160,160,160);
      doc.text("Stay vs Switch Analyser", ml, 293);
      doc.text("Page "+p+" of "+pages, W-35, 293);
    }

    doc.save("Stay-Switch-" + name.replace(/\s+/g,"-") + ".pdf");

    // notify via Formspree
    fetch(FORMSPREE, {
      method:"POST",
      headers:{"Content-Type":"application/json","Accept":"application/json"},
      body: JSON.stringify({
        name: name, whatsapp: wa, email: email,
        industry: ind ? ind.name : "N/A",
        verdict: verd.title, score: ovr+"/10",
        tenure: ans.tenure || "N/A",
        _subject: "New Report - " + name + " (" + (ind?ind.name:"N/A") + ")"
      })
    }).catch(function(){});

    var btn2 = document.getElementById("dlbtn");
    if (btn2) { btn2.disabled = false; btn2.textContent = "Download PDF Report"; }
    var ok2 = document.getElementById("dlok");
    if (ok2) ok2.style.display = "block";

  } catch(e) {
    var btn3 = document.getElementById("dlbtn");
    if (btn3) { btn3.disabled = false; btn3.textContent = "Download PDF Report"; }
    alert("Error generating PDF: " + e.message);
  }
}

/* ---------- SHARE ---------- */
function makeShareURL() {
  try {
    return window.location.href.split("?")[0] + "?d=" + encodeURIComponent(btoa(JSON.stringify(ans)));
  } catch(e) { return window.location.href; }
}

function doShare() {
  var u = document.getElementById("surl");
  if (!u) return;
  try {
    navigator.clipboard.writeText(u.value).then(function() {
      var el = document.getElementById("cok");
      if (el) { el.textContent = "Link copied!"; setTimeout(function(){ if(el) el.textContent=""; }, 2500); }
    });
  } catch(e) { u.select(); }
}

function loadShared() {
  try {
    var p = new URLSearchParams(window.location.search);
    var d = p.get("d");
    if (!d) return false;
    ans = JSON.parse(atob(decodeURIComponent(d)));
    step = STEPS.length;
    isShared = true;
    return true;
  } catch(e) { return false; }
}

function restart() {
  step = 0; ans = {}; aiTxt = ""; isShared = false;
  if (chartObj) { try { chartObj.destroy(); } catch(e){} chartObj = null; }
  setDefaults();
  initBar();
  render();
  window.scrollTo(0,0);
}

// INIT
setDefaults();
initBar();
loadShared();
render();
</script>
